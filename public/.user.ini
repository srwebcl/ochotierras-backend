; PHP-FPM User INI — cPanel compatible
; IMPORTANTE: tarda hasta 5 minutos en activarse tras el deploy
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
; Directorio temporal de uploads apuntando al home del usuario (evita restricciones de /tmp en cPanel)
upload_tmp_dir = /home/ochotierras/tmp
